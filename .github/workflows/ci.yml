name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:ci

      - name: Check for SUPABASE_SERVICE_ROLE_KEY in client code
        run: |
          MATCHES=$(grep -rs "SUPABASE_SERVICE_ROLE_KEY" components/ app/ --include="*.tsx" --include="*.ts" \
            | grep -v "server\.ts" | grep -v "service\.ts" | grep -v "route\.ts" \
            | grep -v "envKey:" | grep -v "envVar=" || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::SUPABASE_SERVICE_ROLE_KEY found in client code"
            exit 1
          fi

      - name: Warn on console.log usage
        run: |
          if grep -r "console.log" src/ components/ app/ --include="*.tsx" --include="*.ts" -l; then
            echo "::warning::console.log statements found in the above files"
          fi
